server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lets AriaNg reach aria2's JSON-RPC without exposing the RPC port itself
    # to the network the browser is on. AriaNg builds its RPC URL as
    # {protocol}://{host}:{port}/{interface} — pointing it at this same host on
    # port 6880 with interface "jsonrpc" lands here, and this proxies to the
    # aria2 container over the internal docker network only.
    location /jsonrpc {
        proxy_pass http://aria2:6800/jsonrpc;
        proxy_set_header Host $host;
    }
}
