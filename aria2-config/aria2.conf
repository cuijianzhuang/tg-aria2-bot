#
# Based on https://github.com/P3TERX/aria2.conf (MIT License)
# Adjusted paths for tg-aria2-bot: download dir /downloads, config dir /config
#

## 文件保存设置 ##
dir=/downloads
disk-cache=64M
file-allocation=none
no-file-allocation-limit=64M
continue=true
always-resume=false
max-resume-failure-tries=0
remote-time=true

## 进度保存设置 ##
input-file=/config/aria2.session
save-session=/config/aria2.session
save-session-interval=1
auto-save-interval=20
force-save=false

## 下载连接设置 ##
max-file-not-found=10
max-tries=0
retry-wait=10
connect-timeout=10
timeout=10
max-concurrent-downloads=3
max-connection-per-server=16
split=16
min-split-size=4M
piece-length=1M
allow-piece-length-change=true
lowest-speed-limit=0
max-overall-download-limit=0
max-download-limit=0
disable-ipv6=true
http-accept-gzip=true
reuse-uri=false
no-netrc=true
allow-overwrite=false
auto-file-renaming=true
content-disposition-default-utf8=true

## BT/PT 下载设置 ##
listen-port=51413
dht-listen-port=51413
enable-dht=true
enable-dht6=false
dht-file-path=/config/dht.dat
dht-file-path6=/config/dht6.dat
dht-entry-point=dht.transmissionbt.com:6881
dht-entry-point6=dht.transmissionbt.com:6881
bt-enable-lpd=true
enable-peer-exchange=true
bt-max-peers=128
bt-request-peer-speed-limit=10M
max-overall-upload-limit=2M
max-upload-limit=0
seed-ratio=1.0
seed-time=0
bt-hash-check-seed=true
bt-seed-unverified=false
bt-tracker-connect-timeout=10
bt-tracker-timeout=10
bt-prioritize-piece=head=32M,tail=32M
rpc-save-upload-metadata=true
follow-torrent=true
pause-metadata=false
bt-save-metadata=true
bt-load-saved-metadata=true
bt-remove-unselected-file=true
bt-force-encryption=true
bt-detach-seed-only=true

## 客户端伪装 ##
user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
peer-agent=Deluge 1.3.15
peer-id-prefix=-DE13F0-

## 执行额外命令 ##
# 注意：p3terx/aria2-pro 镜像首次启动会用它自己的 core/clean.sh/delete.sh/tracker.sh
# 覆盖到 /config/script/，并且它的 core 把 ARIA2_CONF_DIR 写死为 /config（不依赖脚本
# 物理路径），所以这里必须指向 /config/script/ 下的文件，不能是 /config/ 顶层。
# 完成/停止后仅做控制文件清理（delete-dot-aria2/torrent/空目录），不做 move/upload。
# upload.sh 未接入 hook，属于按需手动开启的可选功能（见 script.conf 注释），启用后
# on-download-complete 会改成 /config/script/upload.sh（内含 CLEAN_UP，清理功能不丢失）。
on-download-stop=/config/script/delete.sh
on-download-complete=/config/script/clean.sh

## RPC 设置 ##
enable-rpc=true
rpc-allow-origin-all=true
rpc-listen-all=true
rpc-listen-port=6800
rpc-secret=__ARIA2_SECRET_PLACEHOLDER__
rpc-max-request-size=10M

## 日志设置 ##
console-log-level=notice
quiet=false
summary-interval=0
show-console-readout=false

## BitTorrent trackers ##
# 留空由 tracker.sh / 镜像自带的 UPDATE_TRACKERS 定时更新
bt-tracker=
