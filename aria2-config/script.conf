#
# Based on https://github.com/P3TERX/aria2.conf (MIT License)
#
# 重要说明：move.sh / upload.sh 这两个脚本本身并没有被 aria2.conf 的
# on-download-complete 钩子调用（钩子只指向 clean.sh，clean.sh 只做控制文件清理，
# 不会移动或上传文件）。也就是说下面这两节配置默认就是“惰性”的、不生效，
# 除非你把 aria2.conf 里的 on-download-complete 手动改成指向 move.sh 或 upload.sh。
# 这与最初设计文档中“需要显式关闭 move/upload”的说法不同——它们默认就是关闭的。
# 保留这两节配置只是为了 V3 阶段需要时随时可用。
#

## 文件上传设置(upload.sh，默认未接入 hook) ##
#drive-name=OneDrive
#drive-dir=/DRIVEX/Download
#upload-log=/config/upload.log

## 文件移动设置(move.sh，默认未接入 hook) ##
#dest-dir=/downloads/completed
#move-log=/config/move.log

## 文件删除设置(delete.sh，on-download-stop 使用) ##
delete-on-removed=true
delete-on-error=true
delete-on-unknown=true

## 文件清理设置(全局，clean.sh / delete.sh 使用) ##
delete-dot-aria2=true
delete-dot-torrent=true
delete-empty-dir=true

## 文件过滤设置(全局，仅 BT 多文件下载时有效) ##
#min-size=10M
#include-file=mp4|mkv|rmvb|mov|avi
#exclude-file=html|url|lnk|txt|jpg|png
#include-file-regex=
#exclude-file-regex=
